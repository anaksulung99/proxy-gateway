# ============================================================
# External nginx (on the Ubuntu host) → web container
#   sudo cp infra/nginx/proxy-system.conf /etc/nginx/sites-available/proxy-system
#   sudo ln -s /etc/nginx/sites-available/proxy-system /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d proxy.example.com        # issues + wires TLS
#   sudo nginx -t && sudo systemctl reload nginx
#
# Only the WEB UI is reverse-proxied here. The proxy GATEWAY ports
# (8000 = HTTP proxy, 1080 = SOCKS5) are raw proxy protocols — clients connect
# straight to <server>:8000 / <server>:1080 (open them in your firewall). Do NOT
# put them behind this HTTP nginx. (Optional L4 passthrough example at the bottom.)
#
# Recommended: bind the web container to localhost so only nginx reaches it —
# in docker-compose.yml change the web port to  "127.0.0.1:3333:3333".
# ============================================================

# ---- HTTP: ACME challenge + redirect everything to HTTPS ----
server {
   # managed by Certbot
    if ($host = localtunnel.it.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name smartboostlabs.com;

    return 404;
}

# ---- HTTPS: reverse proxy to the web container ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smartboostlabs.com;


    # certbot manages these:
    ssl_certificate /etc/letsencrypt/live/localtunnel.it.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/localtunnel.it.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


    # Proxy imports can be a couple MB of pasted text.
    ssl_session_cache shared:SSL:10m;
    client_max_body_size 50m;


    location / {
        proxy_pass http://127.0.0.1:3333;   # web container (WEB_HOST_PORT)
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket/SSE-friendly (harmless for the XHR-based app)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_buffering     off;
    }
}

# Needed once (http block) for the Connection upgrade map above. If you already
# have this map elsewhere, drop it here:
#   map $http_upgrade $connection_upgrade { default upgrade; '' close; }


# ============================================================
# GRAFANA (monitoring dashboards) — only if you run `--profile monitoring`.
#   sudo certbot --nginx -d grafana.example.com
# Also set in .env so Grafana builds correct links:
#   GF_SERVER_ROOT_URL=https://grafana.example.com
# and bind it to localhost in docker-compose.yml: "127.0.0.1:3000:3000".
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name grafana.smartboostlabs.com;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.smartboostlabs.com;

    ssl_certificate /etc/letsencrypt/live/grafana.smartboostlabs.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/grafana.smartboostlabs.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    location / {
        proxy_pass http://127.0.0.1:3000;   # grafana container
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Grafana Live (websockets):
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

