# ============================================================
# Traefik v3 — Main Configuration
# ============================================================

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# API & Dashboard
api:
  dashboard: true
  insecure: false

# Logging
log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        Authorization: drop
        Content-Type: keep

# Entrypoints
entryPoints:
  # HTTP — redirect ke HTTPS di production
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: false # set true di production

  # HTTPS
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

  # HTTP Proxy port (TCP)
  http-proxy:
    address: ":3128"

  # SOCKS5 port (TCP)
  socks5:
    address: ":1080"

# Certificate resolver — Let's Encrypt
certificatesResolvers:
  letsencrypt:
    acme:
      email: "" # Diisi dari env via label
      storage: /certs/acme.json
      httpChallenge:
        entryPoint: web

# Provider — Docker
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy-internal
    watch: true
  # Dynamic file config
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Metrics — expose ke Prometheus
metrics:
  prometheus:
    entryPoint: web
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
