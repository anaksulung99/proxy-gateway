# ============================================================
# Prometheus scrape config (docker compose --profile monitoring)
# ============================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'proxy-system'

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Go services expose /metrics on their main port.
  - job_name: 'scraper'
    static_configs:
      - targets: ['scraper:8002']

  - job_name: 'health-checker'
    static_configs:
      - targets: ['health-checker:8003']

  # NOTE: proxy-engine's /metrics is behind INTERNAL_API_SECRET (X-Internal-Secret
  # header), which Prometheus static scrape cannot send. Drop the auth on that
  # route in apps/proxy-engine/internal/server/router.go if you want it scraped.
  # - job_name: 'proxy-engine'
  #   static_configs:
  #     - targets: ['proxy-engine:8001']

  # RabbitMQ ships the prometheus plugin on 15692 in the -management image.
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
