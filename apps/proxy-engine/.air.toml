[build]
  cmd = "go build -o ./tmp/main.exe ."

  entrypoint = ["./tmp/main.exe"]

  bin = ".\\tmp\\main.exe"
  full_bin = ".\\tmp\\main.exe"

  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  kill_delay = "200ms"
  send_interrupt = true
  rerun = false

[build.windows]
  cmd = "go build -o ./tmp/main.exe ."
  bin = "tmp\\main.exe"
  entrypoint = ["tmp\\main.exe"]

[log]
  time = true
  level = "debug"

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[screen]
  clear_on_rebuild = true
  keep_scroll = true
