# ============================================================
# Prod override — resource limits, no port expose, replicas
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

version: '3.9'

services:
  web:
    build:
      target: production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  proxy-engine:
    build:
      target: production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  scraper:
    build:
      target: production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  health-checker:
    build:
      target: production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G # Playwright needs more memory

  postgres:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
