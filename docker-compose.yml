# ============================================================
# Residential / Mobile Proxy Platform — Docker Compose
#
#   cp .env.example .env          # then edit secrets
#   docker compose up -d --build                 # core stack
#   docker compose --profile monitoring up -d    # + Prometheus/Grafana/Loki
#   docker compose --profile edge up -d          # + Traefik (TLS reverse proxy)
#
# NOTE on ports: postgres/redis/rabbitmq listen on their DEFAULT ports INSIDE
# the docker network (services talk via hostnames), but are PUBLISHED to the
# host on NON-DEFAULT ports so they never clash with the native redis/postgres/
# rabbitmq already running on this Ubuntu server. See *_HOST_PORT in .env.
# ============================================================

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

networks:
  proxynet:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # ────────────────────────── Datastores ──────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: ${DB_USER:-proxy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_DATABASE:-proxy_system}
    ports:
      # Bound to localhost ONLY — reach it from your laptop via SSH tunnel, never
      # from the public internet. (Apps reach it internally as postgres:5432.)
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    networks: [proxynet]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-proxy} -d ${DB_DATABASE:-proxy_system}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env} --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379" # localhost only — SSH tunnel for remote
    volumes:
      - redis-data:/data
    networks: [proxynet]
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    <<: [*restart, *logging]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-proxy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/proxy}
    ports:
      - "127.0.0.1:${RABBITMQ_HOST_PORT:-5673}:5672" # amqp — localhost only (5673: native rabbitmq still on 5672)
      - "127.0.0.1:${RABBITMQ_MGMT_HOST_PORT:-15673}:15672" # mgmt UI — localhost only
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [proxynet]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ────────────────────────── App services ──────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: production
    <<: [*restart, *logging]
    env_file: .env
    environment:
      VITE_APP_NAME: "${VITE_APP_NAME:-proxy}"
      TZ: "${TZ:-UTC}"
      NODE_ENV: production
      PORT: "3333"
      HOST: 0.0.0.0
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      APP_KEY: "${APP_KEY:?set APP_KEY in .env — generate with: docker compose run --rm web node ace generate:key}"
      APP_URL: "${APP_URL:-http://localhost:3333}"
      SESSION_DRIVER: "${SESSION_DRIVER:-cookie}"
      DB_CONNECTION: "${DB_CONNECTION:-postgres}"
      DB_HOST: postgres
      DB_PORT: "5432" # postgres' INTERNAL port (5433 is only the host mapping)
      DB_USER: "${DB_USER:-proxy}"
      DB_PASSWORD: "${DB_PASSWORD:?set DB_PASSWORD in .env}"
      DB_DATABASE: "${DB_DATABASE:-proxy_system}"
      REDIS_HOST: redis
      REDIS_PORT: "6379" # redis' INTERNAL port (host mapping differs)
      REDIS_PASSWORD: "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"
      HEALTHCHECK_ENQUEUE_ENABLED: "${HEALTHCHECK_ENQUEUE_ENABLED:-true}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672" # rabbitmq's INTERNAL amqp port (host mapping differs)
      RABBITMQ_USER: "${RABBITMQ_USER:-proxy}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}"
      RABBITMQ_VHOST: "${RABBITMQ_VHOST:-/proxy_system}"
      RABBITMQ_MGMT_PORT: "${RABBITMQ_MGMT_PORT:-15673}"
      HEALTH_CHECKER_URL: "${HEALTH_CHECKER_URL:-http://health-checker:8003}"
      HEALTH_CHECKER_TARGET_URL: "${HEALTH_CHECKER_TARGET_URL:-http://localhost:3333/health}"
      SCRAPER_URL: "${SCRAPER_URL:-http://scraper:8002}"
      SCRAPER_SCHEDULER_ENABLED: "${SCRAPER_SCHEDULER_ENABLED:-true}"
      SCRAPER_SCHEDULER_TICK_SECONDS: "${SCRAPER_SCHEDULER_TICK_SECONDS:-60}"
      PROXY_USAGE_PRUNER_ENABLED: "${PROXY_USAGE_PRUNER_ENABLED:-true}"
      PROXY_USAGE_PRUNER_TICK_SECONDS: "${PROXY_USAGE_PRUNER_TICK_SECONDS:-60}"
      PROXY_USAGE_LOG_RETENTION_DAYS: "${PROXY_USAGE_LOG_RETENTION_DAYS:-30}"
      GATEWAY_HOST: "${GATEWAY_HOST:-localhost}"
      GATEWAY_SOCKS_HOST: "${GATEWAY_SOCKS_HOST:-localhost}"
      GATEWAY_SECRET: "${GATEWAY_SECRET:?set a strong GATEWAY_SECRET in .env}"
      PROXY_ENGINE_ADMIN_URL: "${PROXY_ENGINE_ADMIN_URL:-http://localhost:8001}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:?set a strong INTERNAL_API_SECRET in .env}"
      GEO_ENRICHMENT_ENABLED: "${GEO_ENRICHMENT_ENABLED:-true}"
      GEO_ENRICHMENT_TICK_SECONDS: "${GEO_ENRICHMENT_TICK_SECONDS:-30}"
      GEO_ENRICHMENT_BATCH_LIMIT: "${GEO_ENRICHMENT_BATCH_LIMIT:-100}"
      SMTP_HOST: "${SMTP_HOST:-smtp}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-proxy@example.com}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-proxy@example.com}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Proxy}"
      SMTP_FROM_EMAIL: "${SMTP_FROM_EMAIL:-proxy@example.com}"
      ENABLE_REGISTRATION: "${ENABLE_REGISTRATION:-false}"
      GATEWAY_PORT: "${GATEWAY_PORT:-8000}"
      SOCKS_PORT: "${SOCKS_PORT:-1080}"
      DEFAULT_ADMIN_EMAIL: "${DEFAULT_ADMIN_EMAIL:-admin@example.com}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD:-password321}"
    ports:
      - "${WEB_HOST_PORT:-3333}:3333"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Only used when the `edge` (Traefik) profile is running.
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN:-proxy.example.com}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.services.web.loadbalancer.server.port=3333"

  proxy-engine:
    build:
      context: apps/proxy-engine
      dockerfile: ../../infra/docker/proxy-engine.Dockerfile
      target: production
    <<: [*restart, *logging]
    env_file: .env
    environment:
      GO_ENV: production
      PORT: "8001" # admin/health
      GATEWAY_PORT: "8000" # HTTP forward proxy
      SOCKS_PORT: "1080" # SOCKS5
      WORKERS: "${PROXY_ENGINE_WORKERS:-50}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:?set a strong INTERNAL_API_SECRET in .env}"
      RUNTIME_FAILURE_THRESHOLD: "${RUNTIME_FAILURE_THRESHOLD:-2}"
      RUNTIME_FAILURE_WINDOW_SEC: "${RUNTIME_FAILURE_WINDOW_SEC:-300}"
      RUNTIME_AUTO_RECHECK_ENABLED: ${RUNTIME_AUTO_RECHECK_ENABLED:-true}
      RUNTIME_AUTO_RECHECK_DELAY_SEC: "${RUNTIME_AUTO_RECHECK_DELAY_SEC:-90}"
      RUNTIME_AUTO_RECHECK_MAX_ATTEMPTS: "${RUNTIME_AUTO_RECHECK_MAX_ATTEMPTS:-2}"
      RUNTIME_AUTO_RECHECK_RETRY_DELAY_SEC: "${RUNTIME_AUTO_RECHECK_RETRY_DELAY_SEC:-180}"
      DB_HOST: postgres
      DB_PORT: "5432" # postgres' INTERNAL port (5433 is only the host mapping)
      DB_USER: "${DB_USER:-proxy}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_DATABASE: "${DB_DATABASE:-proxy_system}"
      REDIS_HOST: redis
      REDIS_PORT: "6379" # redis' INTERNAL port (host mapping differs)
      REDIS_PASSWORD: "${REDIS_PASSWORD:-proxy}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672" # rabbitmq's INTERNAL amqp port (host mapping differs)
      RABBITMQ_USER: "${RABBITMQ_USER:-proxy}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-proxy}"
      RABBITMQ_VHOST: "${RABBITMQ_VHOST:-/proxy}"
      RABBITMQ_MGMT_PORT: "${RABBITMQ_MGMT_PORT:-15673}"
    ports:
      - "${GATEWAY_HOST_PORT:-8000}:8000" # HTTP proxy — clients connect here
      - "${SOCKS_HOST_PORT:-1080}:1080" # SOCKS5 — clients connect here
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  scraper:
    build:
      context: apps/scraper
      dockerfile: ../../infra/docker/scraper.Dockerfile
      target: production
    <<: [*restart, *logging]
    env_file: .env
    environment:
      GO_ENV: production
      PORT: "8002"
      WORKERS: "${SCRAPER_WORKERS:-20}"
      DB_HOST: postgres
      DB_PORT: "5432" # postgres' INTERNAL port (5433 is only the host mapping)
      DB_USER: "${DB_USER:-proxy}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_DATABASE: "${DB_DATABASE:-proxy_system}"
      REDIS_HOST: redis
      REDIS_PORT: "6379" # redis' INTERNAL port (host mapping differs)
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672" # rabbitmq's INTERNAL amqp port (host mapping differs)
      RABBITMQ_USER: "${RABBITMQ_USER:-proxy}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_VHOST: "${RABBITMQ_VHOST:-/proxy}"
      SCRAPER_HTTP_RETRY_ATTEMPTS: "${SCRAPER_HTTP_RETRY_ATTEMPTS:-3}"
      SCRAPER_HTTP_RETRY_BACKOFF_MS: "${SCRAPER_HTTP_RETRY_BACKOFF_MS:-1000}"
      SCRAPER_PAGINATION_MAX_PAGES: "${SCRAPER_PAGINATION_MAX_PAGES:-10}"
      SCRAPER_MAX_ENTRIES_PER_RUN: "${SCRAPER_MAX_ENTRIES_PER_RUN:-2000}" # cap bulk sources (e.g. openproxy-list)
      GEONODE_MAX_PAGES: "${GEONODE_MAX_PAGES:-10}"
      PROXYDB_MAX_PAGES: "${PROXYDB_MAX_PAGES:-10}"
      FREEPROXY_WORLD_MAX_PAGES: "${FREEPROXY_WORLD_MAX_PAGES:-10}"
      PROXY_DAILY_MAX_PAGES: "${PROXY_DAILY_MAX_PAGES:-10}"
      PROXYNOVA_MAX_PAGES: "${PROXYNOVA_MAX_PAGES:-10}"
      HIDE_MN_MAX_PAGES: "${HIDE_MN_MAX_PAGES:-10}"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  health-checker:
    build:
      context: apps/health-checker
      dockerfile: ../../infra/docker/checker.Dockerfile
      args:
        # Set CHECKER_INSTALL_CHROMIUM=false in .env for a ~1 GB leaner image
        # (drops the playwright check mode; request/crawlee still work).
        INSTALL_CHROMIUM: "${CHECKER_INSTALL_CHROMIUM:-true}"
    <<: [*restart, *logging]
    env_file: .env
    environment:
      GO_ENV: production
      PORT: "8003"
      WORKERS: "${CHECKER_WORKERS:-50}"
      CONSUMER_ENABLED: "${CONSUMER_ENABLED:-true}"
      DB_HOST: postgres
      DB_PORT: "5432" # postgres' INTERNAL port (5433 is only the host mapping)
      DB_USER: "${DB_USER:-proxy}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_DATABASE: "${DB_DATABASE:-proxy_system}"
      REDIS_HOST: redis
      REDIS_PORT: "6379" # redis' INTERNAL port (host mapping differs)
      REDIS_PASSWORD: "${REDIS_PASSWORD:-proxy}"
      HEALTHCHECK_ENQUEUE_ENABLED: "${HEALTHCHECK_ENQUEUE_ENABLED:-true}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672" # rabbitmq's INTERNAL amqp port (host mapping differs)
      RABBITMQ_USER: "${RABBITMQ_USER:-proxy}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_VHOST: "${RABBITMQ_VHOST:-/proxy}"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8003/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ────────────────────────── Monitoring (profile) ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks: [proxynet]

  grafana:
    image: grafana/grafana:10.4.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ADMIN_EMAIL: ${GRAFANA_ADMIN_EMAIL:-admin@example.com}
      GF_SECURITY_ADMIN_ORG_NAME: ${GRAFANA_ADMIN_ORG_NAME:-Residential Proxy}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    networks: [proxynet]
    depends_on: [prometheus, loki]

  loki:
    image: grafana/loki:2.9.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks: [proxynet]

  promtail:
    image: grafana/promtail:2.9.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks: [proxynet]
    depends_on: [loki]

  # ────────────────────────── Edge / TLS (profile) ──────────────────────────
  traefik:
    image: traefik:v3.0
    profiles: [edge]
    <<: [*restart, *logging]
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.le.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/acme:/acme
    networks: [proxynet]
