# ============================================================
# Residential / Mobile Proxy Platform — Docker Compose
#
#   cp .env.example .env          # then edit secrets
#   docker compose up -d --build                 # core stack
#   docker compose --profile monitoring up -d    # + Prometheus/Grafana/Loki
#   docker compose --profile edge up -d          # + Traefik (TLS reverse proxy)
#
# NOTE on ports: postgres/redis/rabbitmq listen on their DEFAULT ports INSIDE
# the docker network (services talk via hostnames), but are PUBLISHED to the
# host on NON-DEFAULT ports so they never clash with the native redis/postgres/
# rabbitmq already running on this Ubuntu server. See *_HOST_PORT in .env.
# ============================================================

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

networks:
  proxynet:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # ────────────────────────── Datastores ──────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: ${DB_USER:-proxy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_DATABASE:-proxy_system}
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432' # host:container (changed to avoid native pg)
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    networks: [proxynet]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-proxy} -d ${DB_DATABASE:-proxy_system}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env} --save 60 1 --loglevel warning
    ports:
      - '${REDIS_HOST_PORT:-6380}:6379' # changed to avoid native redis
    volumes:
      - redis-data:/data
    networks: [proxynet]
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    <<: [*restart, *logging]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-proxy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/proxy}
    ports:
      - '${RABBITMQ_HOST_PORT:-5673}:5672' # amqp (changed to avoid native rabbitmq)
      - '${RABBITMQ_MGMT_HOST_PORT:-15673}:15672' # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [proxynet]
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 10

  # ────────────────────────── App services ──────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: production
    <<: [*restart, *logging]
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: '3333'
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
      HEALTH_CHECKER_URL: http://health-checker:8003
      SCRAPER_URL: http://scraper:8002
      PROXY_ENGINE_ADMIN_URL: http://proxy-engine:8001
    ports:
      - '${WEB_HOST_PORT:-3333}:3333'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3333/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Only used when the `edge` (Traefik) profile is running.
      - 'traefik.enable=true'
      - 'traefik.http.routers.web.rule=Host(`${DOMAIN:-proxy.example.com}`)'
      - 'traefik.http.routers.web.entrypoints=websecure'
      - 'traefik.http.routers.web.tls.certresolver=le'
      - 'traefik.http.services.web.loadbalancer.server.port=3333'

  proxy-engine:
    build:
      context: apps/proxy-engine
      dockerfile: ../../infra/docker/proxy-engine.Dockerfile
      target: production
    <<: [*restart, *logging]
    env_file: .env
    environment:
      GO_ENV: production
      PORT: '8001' # admin/health
      GATEWAY_PORT: '8000' # HTTP forward proxy
      SOCKS_PORT: '1080' # SOCKS5
      WORKERS: '${PROXY_ENGINE_WORKERS:-50}'
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
    ports:
      - '${GATEWAY_HOST_PORT:-8000}:8000' # HTTP proxy — clients connect here
      - '${SOCKS_HOST_PORT:-1080}:1080' # SOCKS5 — clients connect here
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8001/health']
      interval: 20s
      timeout: 5s
      retries: 3

  scraper:
    build:
      context: apps/scraper
      dockerfile: ../../infra/docker/scraper.Dockerfile
      target: production
    <<: [*restart, *logging]
    env_file: .env
    environment:
      GO_ENV: production
      PORT: '8002'
      WORKERS: '${SCRAPER_WORKERS:-20}'
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8002/health']
      interval: 20s
      timeout: 5s
      retries: 3

  health-checker:
    build:
      context: apps/health-checker
      dockerfile: ../../infra/docker/checker.Dockerfile
    <<: [*restart, *logging]
    env_file: .env
    environment:
      GO_ENV: production
      PORT: '8003'
      WORKERS: '${CHECKER_WORKERS:-50}'
      CONSUMER_ENABLED: 'true'
      DB_HOST: postgres
      DB_PORT: '5432'
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: '5672'
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [proxynet]
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8003/health']
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ────────────────────────── Monitoring (profile) ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - '${PROMETHEUS_HOST_PORT:-9090}:9090'
    networks: [proxynet]

  grafana:
    image: grafana/grafana:10.4.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '${GRAFANA_HOST_PORT:-3000}:3000'
    networks: [proxynet]
    depends_on: [prometheus, loki]

  loki:
    image: grafana/loki:2.9.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks: [proxynet]

  promtail:
    image: grafana/promtail:2.9.0
    profiles: [monitoring]
    <<: [*restart, *logging]
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks: [proxynet]
    depends_on: [loki]

  # ────────────────────────── Edge / TLS (profile) ──────────────────────────
  traefik:
    image: traefik:v3.0
    profiles: [edge]
    <<: [*restart, *logging]
    command:
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}'
      - '--certificatesresolvers.le.acme.storage=/acme/acme.json'
      - '--certificatesresolvers.le.acme.tlschallenge=true'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/acme:/acme
    networks: [proxynet]
