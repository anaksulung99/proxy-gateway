# ============================================================
# Dev override — hot reload, port expose, no resource limits
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================

version: '3.9'

services:
  web:
    build:
      target: development
    volumes:
      - ./apps/web:/app:cached
      - /app/node_modules
    environment:
      - APP_ENV=development
      - NODE_ENV=development
    command: node ace serve --watch
    ports:
      - '3333:3333' # direct access for dev (bypass traefik)

  proxy-engine:
    build:
      target: development
    volumes:
      - ./apps/proxy-engine:/app
    environment:
      - GO_ENV=development
    ports:
      - '8001:8001'

  scraper:
    build:
      target: development
    volumes:
      - ./apps/scraper:/app
    environment:
      - GO_ENV=development
    ports:
      - '8002:8002'

  health-checker:
    build:
      target: development
    volumes:
      - ./apps/health-checker:/app
    environment:
      - GO_ENV=development
    ports:
      - '8003:8003'

  postgres:
    ports:
      - '5432:5432' # expose for local DB tools (TablePlus, DBeaver)

  redis:
    ports:
      - '6379:6379' # expose for local Redis tools

  rabbitmq:
    ports:
      - '5672:5672' # AMQP
      - '15672:15672' # Management UI → http://localhost:15672

  prometheus:
    ports:
      - '9090:9090' # Prometheus UI

  grafana:
    ports:
      - '3000:3000' # Grafana UI → http://localhost:3000

  loki:
    ports:
      - '3100:3100'
